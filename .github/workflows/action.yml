name: Linux Container Python Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: actionin checkoutti
        uses: actions/checkout@v6

      - name: kirjautuminen
        uses: azure/docker-login@v2
        with:
          login-server: ohjelmistolab4.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - run: |
          docker build . -t ohjelmistolab4.azurecr.io/lab4-app
          docker push ohjelmistolab4.azurecr.io/lab4-app

      - name: asennus
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'jannelab4'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ohjelmistolab4.azurecr.io/lab4-app