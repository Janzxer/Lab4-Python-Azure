# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - jannelab4

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ohjelmistolab4.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_472B79A524784C778FED5FB24912E9D6 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8CFA32C8435241668182D91DE06AE18B }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ohjelmistolab4.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_472B79A524784C778FED5FB24912E9D6 }}/lab4-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'jannelab4'
          slot-name: 'Production'
          images: 'ohjelmistolab4.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_472B79A524784C778FED5FB24912E9D6 }}/lab4-app:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F4CC67F13F2945FD9011622CFFCA459F }}